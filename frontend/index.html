<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0,viewport-fit=cover">
<title>NexusPad</title>
<script>

</script>

<style>
/* ── Tokens ──────────────────────────────────────────── */
:root{
  --accent:#2395f3;
  --accent-dk:#1565c0;
  --accent-bg:rgba(35,149,243,.10);
  --accent-bg2:rgba(35,149,243,.20);
  --ok:#34a853;
  --err:#e53935;
  --bg:#eef4fd;
  --surface:#ffffff;
  --surface2:#ddeaf8;
  --border:#c4d9f0;
  --border2:#deeaf8;
  --text:#1a2e4a;
  --muted:#6e8aa8;
  --r-sm:7px;
  --r-md:11px;
  --r-lg:16px;
  --sh-key:0 1px 0 #a8c4e0;
  --sh-card:0 1px 3px rgba(20,70,160,.08);
}
/* ── Reset ───────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,'PingFang SC',system-ui,sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden}

/* ── App shell ───────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left)}

/* ── Topbar ──────────────────────────────────────────── */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:0 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  height:38px;
  box-shadow:0 1px 4px rgba(20,70,160,.06);
}
#brand-icon{width:22px;height:22px;flex-shrink:0}
#brand-name{font-size:12px;font-weight:800;color:#003472;
  letter-spacing:.6px;flex-shrink:0}

#status{
  flex:1;
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:11px;font-weight:500;
}
#status-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  background:var(--muted);transition:background .3s;
}
#status-text{
  padding:2px 12px;border-radius:20px;
  background:var(--surface2);color:var(--muted);
  white-space:nowrap;transition:color .2s,background .2s;
  font-weight:500;
}
#status.ok #status-dot{background:var(--ok);box-shadow:0 0 0 2px rgba(52,168,83,.2)}
#status.ok #status-text{color:var(--ok);background:rgba(52,168,83,.1)}
#status.err #status-dot{background:var(--err)}
#status.err #status-text{color:var(--err);background:rgba(229,57,53,.1)}

#topbar-btns{display:flex;gap:5px;flex-shrink:0}
.top-btn{
  height:28px;min-width:36px;padding:0 9px;
  border:1px solid var(--border);border-radius:var(--r-sm);
  background:var(--surface2);color:var(--muted);
  cursor:pointer;touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;gap:4px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  transition:background .15s,border-color .15s,color .15s,transform .1s,box-shadow .15s;
}
.top-btn:active{transform:scale(.91)}
.top-btn.active{
  background:var(--accent);border-color:var(--accent-dk);color:#fff;
  box-shadow:0 2px 7px rgba(35,149,243,.30);
}
.top-btn .icon{width:15px;height:15px}

/* ── Main ────────────────────────────────────────────── */
#main{display:flex;flex:1;min-height:0}
#right{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0}

/* ── FK Panel ────────────────────────────────────────── */
#fk-panel{
  width:19vw;flex-shrink:0;
  display:flex;flex-direction:column;
  gap:0;padding:6px 5px;
  background:var(--bg);
  border-right:1px solid var(--border);
  overflow-y:auto;
  transition:width .25s cubic-bezier(.4,0,.2,1),opacity .2s,padding .25s;
}
#fk-panel.hidden{width:0;padding:0;opacity:0;overflow:hidden;border:none}

.fk-group{display:flex;flex-direction:column;gap:3px;padding-bottom:6px}
.fk-group+.fk-group{padding-top:6px;border-top:1px solid var(--border2)}
.arrow-row{display:flex;gap:3px}
.arrow-row .fk{flex:1}

.fk{
  padding:0;
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  font-size:11px;font-weight:600;color:var(--text);
  cursor:pointer;touch-action:manipulation;
  background:var(--surface);
  box-shadow:var(--sh-key);
  transition:background .08s,transform .08s,box-shadow .08s;
  min-height:32px;
  display:flex;align-items:center;justify-content:center;
}
.fk:active{background:var(--surface2);transform:scale(.93);box-shadow:none}
.fk.mod.active{
  background:var(--accent);border-color:var(--accent-dk);color:#fff;
  box-shadow:0 2px 8px rgba(35,149,243,.32);
}
/* Combo keys — Ctrl shortcut feel */
.fk.combo{
  font-size:10px;font-weight:700;
  background:var(--accent-bg);
  border-color:rgba(35,149,243,.25);
  color:var(--accent-dk);
  box-shadow:none;
  flex-direction:column;gap:1px;
}
.fk.combo::before{
  content:'⌃';font-size:7px;color:var(--accent);opacity:.7;line-height:1;
}
.fk.combo:active{background:var(--accent-bg2)}
.fk.arrow{font-size:14px;font-weight:800;color:var(--text)}

.combo-group{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}

/* ── Touchpad ────────────────────────────────────────── */
#touchpad{
  flex:1;min-height:0;position:relative;overflow:hidden;
  background:var(--surface);
  /* dot grid */
  background-image:radial-gradient(circle,rgba(170,200,240,.7) 1px,transparent 1px);
  background-size:20px 20px;
  /* recessed feel */
  box-shadow:inset 0 2px 6px rgba(20,70,160,.06);
}
/* Corner bracket decorations — pure CSS */
#touchpad::before,#touchpad::after{
  content:'';position:absolute;
  width:14px;height:14px;
  border-color:var(--border);border-style:solid;
  pointer-events:none;
}
#touchpad::before{top:8px;left:8px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
#touchpad::after {bottom:8px;right:8px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}

.hint{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  color:var(--border2);font-size:11px;font-weight:600;
  letter-spacing:4px;text-transform:uppercase;pointer-events:none;
}

#scroll-tag{
  position:absolute;top:10px;right:12px;
  background:rgba(35,149,243,.10);color:var(--accent);
  padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:600;
  display:none;align-items:center;gap:5px;
  border:1px solid rgba(35,149,243,.20);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#scroll-tag .icon{width:15px;height:15px}

.ripple{
  position:absolute;width:44px;height:44px;border-radius:50%;
  pointer-events:none;transform:translate(-50%,-50%);
  animation:rf .38s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes rf{0%{opacity:.4;transform:translate(-50%,-50%) scale(.2)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}

/* ── Pinyin bar ──────────────────────────────────────── */
#pinyin-bar{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;min-height:32px;
  overflow-x:auto;white-space:nowrap;
  background:var(--surface);border-bottom:1px solid var(--border);
}
#pinyin-bar.hidden{display:none}
#pinyin-input{color:var(--accent);font-size:13px;font-weight:700;padding:2px 6px;flex-shrink:0}
#pinyin-candidates{display:flex;gap:4px;overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch}
.pinyin-cand{
  padding:3px 9px;font-size:14px;color:var(--text);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:5px;cursor:pointer;flex-shrink:0;touch-action:manipulation;
}
.pinyin-cand:active{background:var(--accent);color:#fff;border-color:var(--accent-dk)}
.pinyin-cand:first-child{border-color:var(--accent);color:var(--accent-dk);font-weight:600}

/* ── Hidden textarea ─────────────────────────────────── */
#txt{position:fixed;bottom:0;left:0;width:1px;height:1px;font-size:16px;z-index:-1;
  border:none;resize:none;background:transparent;color:transparent;caret-color:transparent;
  opacity:.001;overflow:hidden;padding:0;outline:none}

/* ── OSK ─────────────────────────────────────────────── */
#osk{
  position:fixed;bottom:0;left:19vw;right:0;
  height:47vh;
  background:var(--bg);
  border-top:1.5px solid var(--border);
  display:flex;flex-direction:column;
  padding:5px 5px 6px;gap:3px;z-index:10;
  user-select:none;-webkit-user-select:none;
  transform:translateY(0);visibility:visible;pointer-events:auto;
  transition:transform .28s ease,left .25s ease,height .25s ease,visibility 0s;
}
#osk:not(.fk-open){left:0}
#osk.hidden{
  transform:translateY(100%);visibility:hidden;pointer-events:none;
  transition:transform .28s ease,left .25s ease,height .25s ease,visibility 0s .28s;
}
.osk-layer{display:flex;flex-direction:column;gap:3px;flex:1}
.osk-row{display:flex;gap:3px;justify-content:center;flex:1;min-height:0}
.osk-spacer-05{flex:.5}

/* Base key */
.osk-key{
  flex:1;
  border:1px solid #bcd1ec;
  border-radius:var(--r-sm);
  background:var(--surface);color:var(--text);
  font-size:clamp(11px,2.2vw,16px);font-weight:500;
  cursor:pointer;touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1.5px 0 #9dbedd;
  transition:background .05s,transform .05s;
  user-select:none;-webkit-user-select:none;
  position:relative;overflow:hidden;
}
.osk-key:active,.osk-key.pressed{
  background:var(--surface2);transform:translateY(1px) scale(.95);
  box-shadow:none;
}
/* Modifier keys — darker tray */
.osk-key.osk-mod{
  background:#d5e7f7;color:var(--muted);
  font-size:clamp(9px,1.8vw,12px);font-weight:700;
  box-shadow:0 1.5px 0 #90bad6;
  border-color:#aac8e4;
}
.osk-key.osk-wide{flex:1.5}
.osk-key.osk-space{
  flex:5.5;font-size:clamp(9px,1.8vw,12px);
  color:var(--muted);letter-spacing:.5px;
}
.osk-key.active{
  background:var(--accent);border-color:var(--accent-dk);color:#fff;
  box-shadow:0 2px 6px rgba(35,149,243,.34);
}

/* ── Sent flash ──────────────────────────────────────── */
#sent{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);
  background:rgba(35,149,243,.92);color:#fff;
  padding:5px 18px;border-radius:20px;
  font-size:11px;font-weight:600;
  opacity:0;transition:opacity .15s;pointer-events:none;z-index:50;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  box-shadow:0 3px 10px rgba(35,149,243,.28);
}
#sent.show{opacity:1}

/* ── Modals ──────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:60;
  display:none;align-items:center;justify-content:center;padding:20px;
  background:rgba(15,40,100,.38);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.modal-overlay.show{display:flex}
.modal-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  box-shadow:0 12px 40px rgba(15,40,100,.18);
  padding:28px 24px;
  width:100%;max-width:310px;text-align:center;
}
.modal-card h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.modal-card p{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:20px}
.modal-btns{display:flex;gap:10px}
.modal-btns button{
  flex:1;padding:12px;border:none;border-radius:var(--r-sm);
  font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;
  transition:transform .08s,filter .1s;
}
.modal-btns button:active{transform:scale(.95);filter:brightness(.9)}
#btn-reject{background:var(--err);color:#fff}
#btn-accept{background:var(--accent);color:#fff}

#auth-modal{position:fixed;inset:0;z-index:70}
#auth-pin{
  width:100%;padding:14px;
  border:2px solid var(--border);border-radius:var(--r-sm);
  background:var(--bg);color:var(--accent);
  font-size:28px;font-weight:700;text-align:center;
  letter-spacing:8px;font-family:Consolas,monospace;
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color .2s;
}
#auth-pin:focus{border-color:var(--accent);background:#fff}
#auth-pin::placeholder{color:var(--border2);letter-spacing:6px}
#auth-error{color:var(--err);font-size:12px;min-height:18px;margin-top:8px}
#auth-submit{
  width:100%;padding:12px;border:none;border-radius:var(--r-sm);
  background:var(--accent);color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;
  margin-top:12px;touch-action:manipulation;
  box-shadow:0 4px 12px rgba(35,149,243,.30);
  transition:transform .08s,background .15s;
}
#auth-submit:active{transform:scale(.97);background:var(--accent-dk)}
.auth-result-btn{
  width:100%;padding:12px;border:none;border-radius:var(--r-sm);
  font-size:15px;font-weight:700;cursor:pointer;
  margin-top:12px;touch-action:manipulation;transition:transform .08s;
}
.auth-result-btn.dismiss{background:var(--surface2);color:var(--text)}
.auth-result-btn.dismiss:active{transform:scale(.97)}

/* ── Landscape optimisation ──────────────────────────── */
@media (orientation:landscape){
  #topbar{height:34px;padding:0 10px;gap:7px}
  .top-btn{height:26px;min-width:34px;font-size:10.5px}
  #fk-panel{width:19vw;padding:5px 4px}
  .fk{min-height:29px;font-size:10px}
  .fk.arrow{font-size:12px}
  .fk.combo{font-size:9px}
  #osk{height:50vh;padding:4px 4px 5px;gap:2px}
  .osk-key{font-size:clamp(10px,2vw,15px)}
  .osk-key.osk-mod{font-size:clamp(8px,1.6vw,11px)}
}
@media (orientation:portrait){
  #fk-panel{width:26vw}
  #osk{left:26vw;height:34vh}
  #osk:not(.fk-open){left:0}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:0s!important;transition-duration:0s!important}
}
</style>

    <span id="brand-name">NexusPad</span>
    <div id="status" class="err">
      <span id="status-dot"></span>
      <span id="status-text">连接中...</span>
    </div>
    <div id="topbar-btns">
      <button id="ime-refresh-btn" class="top-btn" aria-label="刷新输入法" onclick="refreshIme()">
        <span style="font-size:13px;line-height:1">↻</span>
      </button>
      <button id="fk-toggle" class="top-btn active" aria-label="功能键" onclick="toggleFk()">Fn</button>
      <button id="kb-btn" class="top-btn" aria-label="键盘" onclick="toggleKb()">
        <svg class="icon" id="kb-icon"><use xlink:href="#icon-danchujianpan"></use></svg>
      </button>
    </div>
  </div>

  <div id="main">
    <div id="fk-panel">
      <div class="fk-group">
        <button class="fk" data-key="Escape">Esc</button>
        <button class="fk" data-key="Tab">Tab</button>
        <button class="fk" data-key="Delete">Del</button>
      </div>
      <div class="fk-group">
        <button class="fk arrow" data-key="Up">↑</button>
        <div class="arrow-row">
          <button class="fk arrow" data-key="Left">←</button>
          <button class="fk arrow" data-key="Down">↓</button>
          <button class="fk arrow" data-key="Right">→</button>
        </div>
      </div>
      <div class="fk-group">
        <button class="fk mod" data-mod="ctrl">Ctrl</button>
        <button class="fk mod" data-mod="shift">Shift</button>
        <button class="fk mod" data-mod="alt">Alt</button>
      </div>
      <div class="fk-group combo-group">
        <button class="fk combo" data-key="ctrl+c">C</button>
        <button class="fk combo" data-key="ctrl+v">V</button>
        <button class="fk combo" data-key="ctrl+x">X</button>
        <button class="fk combo" data-key="ctrl+z">Z</button>
        <button class="fk combo" data-key="ctrl+a">A</button>
        <button class="fk combo" data-key="ctrl+s">S</button>
      </div>
    </div>

    <div id="right">
      <div id="touchpad">
        <div class="hint">触控板</div>
        <div id="scroll-tag">
          <svg class="icon" id="scroll-icon"><use xlink:href=""></use></svg>
          <span id="scroll-text"></span>
        </div>
      </div>

      <div id="osk" class="hidden fk-open">
        <div id="pinyin-bar" class="hidden">
          <span id="pinyin-input"></span>
          <div id="pinyin-candidates"></div>
        </div>
        <div class="osk-layer" data-layer="alpha">
          <div class="osk-row">
            <button class="osk-key" data-k="q">q</button><button class="osk-key" data-k="w">w</button><button class="osk-key" data-k="e">e</button><button class="osk-key" data-k="r">r</button><button class="osk-key" data-k="t">t</button><button class="osk-key" data-k="y">y</button><button class="osk-key" data-k="u">u</button><button class="osk-key" data-k="i">i</button><button class="osk-key" data-k="o">o</button><button class="osk-key" data-k="p">p</button>
          </div>
          <div class="osk-row">
            <div class="osk-spacer-05"></div>
            <button class="osk-key" data-k="a">a</button><button class="osk-key" data-k="s">s</button><button class="osk-key" data-k="d">d</button><button class="osk-key" data-k="f">f</button><button class="osk-key" data-k="g">g</button><button class="osk-key" data-k="h">h</button><button class="osk-key" data-k="j">j</button><button class="osk-key" data-k="k">k</button><button class="osk-key" data-k="l">l</button>
            <div class="osk-spacer-05"></div>
          </div>
          <div class="osk-row">
            <button class="osk-key osk-mod osk-wide" data-action="shift">⇧</button>
            <button class="osk-key" data-k="z">z</button><button class="osk-key" data-k="x">x</button><button class="osk-key" data-k="c">c</button><button class="osk-key" data-k="v">v</button><button class="osk-key" data-k="b">b</button><button class="osk-key" data-k="n">n</button><button class="osk-key" data-k="m">m</button>
            <button class="osk-key osk-mod osk-wide" data-action="backspace">⌫</button>
          </div>
          <div class="osk-row">
            <button class="osk-key osk-mod" data-action="sym">?123</button>
            <button class="osk-key osk-mod" data-action="lang">中/EN</button>
            <button class="osk-key osk-space" data-action="space">space</button>
            <button class="osk-key osk-mod" data-action="comma">,</button>
            <button class="osk-key osk-mod" data-action="period">.</button>
            <button class="osk-key osk-mod" data-action="return">⏎</button>
          </div>
        </div>
        <div class="osk-layer" data-layer="sym" style="display:none">
          <div class="osk-row">
            <button class="osk-key" data-k="1">1</button><button class="osk-key" data-k="2">2</button><button class="osk-key" data-k="3">3</button><button class="osk-key" data-k="4">4</button><button class="osk-key" data-k="5">5</button><button class="osk-key" data-k="6">6</button><button class="osk-key" data-k="7">7</button><button class="osk-key" data-k="8">8</button><button class="osk-key" data-k="9">9</button><button class="osk-key" data-k="0">0</button>
          </div>
          <div class="osk-row">
            <button class="osk-key" data-k="shift+1">!</button><button class="osk-key" data-k="shift+2">@</button><button class="osk-key" data-k="shift+3">#</button><button class="osk-key" data-k="shift+4">$</button><button class="osk-key" data-k="shift+5">%</button><button class="osk-key" data-k="shift+6">^</button><button class="osk-key" data-k="shift+7">&amp;</button><button class="osk-key" data-k="shift+8">*</button><button class="osk-key" data-k="shift+9">(</button><button class="osk-key" data-k="shift+0">)</button>
          </div>
          <div class="osk-row">
            <button class="osk-key" data-k="`">`</button><button class="osk-key" data-k="-">-</button><button class="osk-key" data-k="=">=</button><button class="osk-key" data-k="[">[</button><button class="osk-key" data-k="]">]</button><button class="osk-key" data-k=";">;</button><button class="osk-key" data-k="'">'</button><button class="osk-key" data-k="shift+`">~</button><button class="osk-key" data-k="\\">\\</button>
            <button class="osk-key osk-mod osk-wide" data-action="backspace">⌫</button>
          </div>
          <div class="osk-row">
            <button class="osk-key osk-mod" data-action="sym">ABC</button>
            <button class="osk-key" data-k=",">,</button><button class="osk-key" data-k=".">.</button><button class="osk-key" data-k="/">/</button><button class="osk-key" data-k="shift+\\">|</button><button class="osk-key" data-k="shift+;">:</button><button class="osk-key" data-k="shift+'">"</button><button class="osk-key" data-k="shift+,">&lt;</button><button class="osk-key" data-k="shift+.">&gt;</button>
            <button class="osk-key osk-mod" data-action="return">⏎</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="approval-overlay" class="modal-overlay">
  <div class="modal-card">
    <h3>新设备请求连接</h3>
    <p id="approval-info">有设备正在尝试接管控制权</p>
    <div class="modal-btns">
      <button id="btn-reject" onclick="approvalResp('reject')">拒绝</button>
      <button id="btn-accept" onclick="approvalResp('accept')">同意</button>
    </div>
  </div>
</div>

<div id="auth-overlay" class="modal-overlay">
  <div class="modal-card">
    <h3>输入配对码</h3>
    <p>请在电脑端查看配对码</p>
    <input id="auth-pin" type="tel" maxlength="6" placeholder="──────" autocomplete="off" inputmode="numeric">
    <div id="auth-error"></div>
    <button id="auth-submit" onclick="submitAuth()">连接</button>
  </div>
</div>
